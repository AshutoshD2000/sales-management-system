{% extends 'base.html' %}

{% block content %}

<h2 class="mb-3">Sales</h2>

<a href="/add-sale/" class="btn btn-success mb-3">Add Sale</a>

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Product</th>
<th>Quantity</th>
<th>Total Price</th>
<th>Date</th>
</tr>
</thead>

<tbody>

{% for s in sales %}
<tr>
<td>{{s.product.name}}</td>
<td>{{s.quantity_sold}}</td>
<td>{{s.total_price}}</td>
<td>{{s.date}}</td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
