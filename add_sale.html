{% extends 'base.html' %}

{% block content %}

<h2>Add Sale</h2>

<form method="POST">
{% csrf_token %}

<select name="product" class="form-control mb-2">

{% for p in products %}
<option value="{{p.id}}">{{p.name}}</option>
{% endfor %}

</select>

<input type="number" name="quantity" class="form-control mb-2" placeholder="Quantity Sold">

<button class="btn btn-primary">Save</button>

</form>

{% endblock %}
