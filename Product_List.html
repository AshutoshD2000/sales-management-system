{% extends 'base.html' %}

{% block content %}

<h2 class="mb-3">Products</h2>

<a href="/add-product/" class="btn btn-success mb-3">Add Product</a>

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Name</th>
<th>Price</th>
<th>Quantity</th>
</tr>
</thead>

<tbody>

{% for p in products %}
<tr>
<td>{{p.name}}</td>
<td>{{p.price}}</td>
<td>{{p.quantity}}</td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
